name: Update changelog

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: read

jobs:
  changelog:
    # Only run for releases cut from main (or the repo default branch).
    if: >-
      github.event.release.target_commitish == 'main' ||
      github.event.release.target_commitish == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate changelog entry from merged PRs
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(
            git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1 || true
          )"

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}...${RELEASE_TAG}"
            echo "Collecting merged PRs in range ${RANGE}"
            MERGED_AT_FILTER="merged:>=$(git log -1 --format=%aI "${PREVIOUS_TAG}")"
          else
            RANGE="${RELEASE_TAG}"
            echo "First release — collecting merged PRs up to ${RELEASE_TAG}"
            MERGED_AT_FILTER=""
          fi

          RELEASE_UNTIL_ISO="$(git log -1 --format=%aI "${RELEASE_TAG}")"

          PR_JSON="$(
            gh pr list \
              --repo "${{ github.repository }}" \
              --state merged \
              --base main \
              --limit 200 \
              --json number,title,url,mergedAt,author \
              ${MERGED_AT_FILTER:+--search "$MERGED_AT_FILTER"}
          )"

          if [ -n "$PREVIOUS_TAG" ]; then
            SINCE_ISO="$(git log -1 --format=%aI "${PREVIOUS_TAG}")"
            PR_JSON="$(
              echo "$PR_JSON" | jq --arg since "$SINCE_ISO" --arg until "$RELEASE_UNTIL_ISO" '
                [ .[] | select(.mergedAt > $since and .mergedAt <= $until) ]
                | sort_by(.mergedAt)
              '
            )"
          else
            PR_JSON="$(
              echo "$PR_JSON" | jq --arg until "$RELEASE_UNTIL_ISO" '
                [ .[] | select(.mergedAt <= $until) ]
                | sort_by(.mergedAt)
              '
            )"
          fi

          RELEASE_DATE="$(git log -1 --format=%Y-%m-%d "${RELEASE_TAG}")"
          RELEASE_TITLE="${RELEASE_NAME:-$RELEASE_TAG}"

          {
            echo "## [${RELEASE_TITLE}] - ${RELEASE_DATE}"
            echo
            if [ "$(echo "$PR_JSON" | jq 'length')" -eq 0 ]; then
              echo "- No merged pull requests in this release range."
            else
              echo "$PR_JSON" | jq -r '.[] | "- \(.title) ([#\(.number)](\(.url))) (@\(.author.login))"'
            fi
            echo
          } > /tmp/release-entry.md

          echo "entry<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-entry.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepend entry to CHANGELOG.md
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          cat /tmp/release-entry.md CHANGELOG.md > "$tmp"
          mv "$tmp" CHANGELOG.md

      - name: Commit and push changelog
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git commit -m "chore: update CHANGELOG for ${{ github.event.release.tag_name }}"
          git push

      - name: Append changelog to release notes when empty
        if: ${{ !github.event.release.body }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/release-entry.md
