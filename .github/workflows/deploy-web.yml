name: Deploy Web (production)

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy web app to Cloudflare Pages (production)
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build shared API client
        run: npm run build --workspace @teemtape/api-client
        working-directory: .

      - name: Build web app
        run: npm run build --workspace @teemtape/web
        working-directory: .

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name teemtape-web --branch main
