# teemtape API — Cloudflare Worker configuration.
#
# Follows docs/clouds/cloudflare.md. The TOP-LEVEL config is the dev/default
# environment (so `wrangler dev` and `vitest` work with no flags); `[env.production]`
# overrides it for deploys (`wrangler deploy --env production`).
#
# Secrets are NOT stored here.
# Local dev: copy .dev.vars.example -> .dev.vars (wrangler dev reads that file).
# Deployed:  npx wrangler secret put POLYGON_API_KEY [--env production]
#
# Replace the placeholder resource ids after creating resources:
#   npx wrangler d1 create teemtape-db          -> copy database_id
#   npx wrangler kv namespace create QUOTES_CACHE -> copy id

name = "teemtape-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true
# account_id is read from the CLOUDFLARE_ACCOUNT_ID env var (or set it here for deploys):
# account_id = "{{CF_ACCOUNT_ID}}"

[observability]
enabled = true

# Non-secret config (see [env.production.vars] for prod overrides).
[vars]
QUOTES_PROVIDER = "polygon"          # "sample" (no key needed) | "polygon"
QUOTE_DELAY_SECONDS = "60"          # intentionally delayed ~1 minute
WEB_URL = "http://localhost:5173"   # used to build share links
SEC_USER_AGENT = "teemtape-api symbols-sync help@teem.cloud"

[triggers]
crons = ["0 */12 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "teemtape-db"
database_id = "276e4395-0d63-4bd3-bf2b-6a65235ba440"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "QUOTES_CACHE"
id = "41d888270da045619243fce144418046"

# --- Production environment -------------------------------------------------
[env.production]
workers_dev = false

[[env.production.routes]]
pattern = "api.teemtape.com"
custom_domain = true

[env.production.observability]
enabled = true

[env.production.vars]
QUOTES_PROVIDER = "polygon"
QUOTE_DELAY_SECONDS = "60"
WEB_URL = "https://www.teemtape.com"
SEC_USER_AGENT = "teemtape-api symbols-sync contact@teemtape.com"

[env.production.triggers]
crons = ["0 */12 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "teemtape-db"
database_id = "276e4395-0d63-4bd3-bf2b-6a65235ba440"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "QUOTES_CACHE"
id = "41d888270da045619243fce144418046"

# --- Not used yet ----------------------------------------------------------
# teemtape uses D1 (notes/watchlists) + KV (quote cache). We do NOT use R2
# object storage today; add it only if/when we have a real need:
# [[r2_buckets]]
# binding = "MY_R2_BUCKET"
# bucket_name = "teemtape-r2-bucket"
